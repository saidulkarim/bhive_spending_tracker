name: bhive_spending_tracker
description: Offline-first daily spending tracker app.
publish_to: 'none'
version: 1.0.1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  intl: ^0.20.2
  csv: ^6.0.0
  file_picker: ^8.1.2
  share_plus: ^10.0.2
  fl_chart: ^0.69.0
  local_auth: ^2.3.0
  crypto: ^3.0.5
  uuid: ^4.5.1
  collection: ^1.18.0
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/icons/bhive_spending_tracker.png
  fonts:
    - family: Exo2
      fonts:
        - asset: assets/fonts/Exo2-Regular.ttf
        - asset: assets/fonts/Exo2-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Exo2-Bold.ttf
          weight: 700
        - asset: assets/fonts/Exo2-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Exo2-Black.ttf
          weight: 900

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/bhive_spending_tracker.png"

  adaptive_icon_background: "#160D0B"
  adaptive_icon_foreground: "assets/icons/bhive_spending_tracker.png"

  min_sdk_android: 21

